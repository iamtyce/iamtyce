<svg width="460" height="200" viewBox="0 0 460 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Ambient amber glow at top -->
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <!-- Logo shimmer gradient: mostly gold, subtle brightness variation -->
    <linearGradient id="logoGrad" x1="90" x2="370" y1="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#D97706"/>
      <stop offset="25%"  stop-color="#F59E0B"/>
      <stop offset="44%"  stop-color="#FBBF24"/>
      <stop offset="50%"  stop-color="#FCD34D"/>
      <stop offset="56%"  stop-color="#FBBF24"/>
      <stop offset="75%"  stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <!-- Bottom fade for depth -->
    <linearGradient id="bottomFade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0C0809" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0C0809" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="460" height="200" fill="#0C0809"/>

  <!-- Outer border -->
  <rect width="460" height="200" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Amber ambient glow -->
  <rect width="460" height="200" fill="url(#bgGlow)"/>

  <!-- Bottom depth fade -->
  <rect width="460" height="200" fill="url(#bottomFade)"/>

  <!-- Subtle top accent line -->
  <line x1="0" y1="0" x2="460" y2="0" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Eyebrow tag -->
  <text
    x="230" y="66"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="10"
    font-weight="700"
    letter-spacing="0.10em"
    fill="#F59E0B"
    fill-opacity="0.75"
  >FOR SOFTWARE ENGINEERS</text>

  <!-- Logo: "Redline" gradient + amber dot -->
  <text
    x="230" y="122"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="54"
    font-weight="700"
    letter-spacing="-0.03em"
    fill="url(#logoGrad)"
  >Redline<tspan fill="#F59E0B">.</tspan></text>

  <!-- Single-line explainer -->
  <text
    x="230" y="158"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="14"
    fill="#7A6A5A"
    letter-spacing="0.01em"
  >Stop underselling your work.</text>
</svg>
